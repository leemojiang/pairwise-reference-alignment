cache_dir: /root/autodl-tmp/pairalign-cache
output_dir: ../runs

swanlab:
  enabled: true
  project: pairwise-reference-alignment

models:
  - Qwen/Qwen2.5-0.5B
  - Qwen/Qwen2.5-0.5B-Instruct
  - Qwen/Qwen2.5-1.5B
  - Qwen/Qwen2.5-1.5B-Instruct
  - Qwen/Qwen2.5-3B
  - Qwen/Qwen2.5-3B-Instruct
  - Qwen/Qwen2.5-7B
  - Qwen/Qwen2.5-7B-Instruct

datasets:
  - allenai/reward-bench

scoring_rules:
  - token_normalized_loglikelihood

run:
  name: experiment1and2_qwen_rewardbench
  limit: null
  sample_size: null
  sample_by_subset: false
  batch_size: 2
  max_length: 2048
  dtype: bf16
  device: cuda
  seed: 20260527
  trust_remote_code: true
  resume: true
  prompt_format: plain
