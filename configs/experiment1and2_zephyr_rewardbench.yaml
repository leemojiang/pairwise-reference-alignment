cache_dir: /root/autodl-tmp/pairalign-cache
output_dir: ../runs

swanlab:
  enabled: true
  project: pairwise-reference-alignment

models:
  - mistralai/Mistral-7B-v0.1
  - HuggingFaceH4/zephyr-7b-beta

datasets:
  - allenai/reward-bench

scoring_rules:
  - token_normalized_loglikelihood

run:
  name: experiment1and2_zephyr_rewardbench
  limit: null
  sample_size: null
  sample_by_subset: false
  batch_size: 1
  max_length: 2048
  dtype: bf16
  device: cuda
  seed: 20260527
  trust_remote_code: true
  resume: true
  prompt_format: plain
