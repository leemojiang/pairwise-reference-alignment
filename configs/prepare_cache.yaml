cache_dir: /root/autodl-tmp/pairalign-cache
output_dir: ./runs
hf_endpoint: https://hf-mirror.com

swanlab:
  enabled: true
  project: pairwise-reference-alignment

huggingface:
  token_env: HF_TOKEN

models:
  - Qwen/Qwen2.5-0.5B
  - Qwen/Qwen2.5-0.5B-Instruct
  - Qwen/Qwen2.5-1.5B
  - Qwen/Qwen2.5-1.5B-Instruct
  - Qwen/Qwen2.5-3B
  - Qwen/Qwen2.5-3B-Instruct
  - Qwen/Qwen2.5-7B
  - Qwen/Qwen2.5-7B-Instruct

datasets:
  - allenai/reward-bench

download:
  trust_remote_code: true
  download_models: true
  download_datasets: true
  dataset_verify_limit: 20
  ignore_patterns:
    - "*.msgpack"
    - "*.h5"
    - "*.ot"
